name: CMake on multiple platforms

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false

      # Matrix: OS × compiler
      # ubuntu-latest        → x86-64 (GCC, Clang)
      # ubuntu-24.04-arm     → ARM64 / NEON (GCC, Clang)
      # macos-latest         → Apple Silicon ARM64 (Clang)
      # windows-latest       → x86-64 (MSVC)
      matrix:
        os: [ubuntu-latest, ubuntu-24.04-arm, windows-latest, windows-11-arm, macos-latest, macos-15-intel]
        build_type: [Release, Debug]
        c_compiler: [gcc, clang, cl]
        include:
          - os: windows-latest
            c_compiler: cl
            cpp_compiler: cl
          - os: windows-11-arm
            c_compiler: cl
            cpp_compiler: cl
          - os: ubuntu-latest
            c_compiler: gcc
            cpp_compiler: g++
          - os: ubuntu-latest
            c_compiler: clang
            cpp_compiler: clang++
          - os: ubuntu-24.04-arm
            c_compiler: gcc
            cpp_compiler: g++
          - os: ubuntu-24.04-arm
            c_compiler: clang
            cpp_compiler: clang++
          - os: macos-latest
            c_compiler: clang
            cpp_compiler: clang++
          - os: macos-15-intel
            c_compiler: clang
            cpp_compiler: clang++
        exclude:
          - os: windows-latest
            c_compiler: gcc
          - os: windows-latest
            c_compiler: clang
          - os: windows-11-arm
            c_compiler: gcc
          - os: windows-11-arm
            c_compiler: clang
          - os: ubuntu-latest
            c_compiler: cl
          - os: ubuntu-24.04-arm
            c_compiler: cl
          - os: macos-latest
            c_compiler: cl
          - os: macos-latest
            c_compiler: gcc
          - os: macos-15-intel
            c_compiler: cl
          - os: macos-15-intel
            c_compiler: gcc

    steps:
    - uses: actions/checkout@v6

    - name: Set reusable strings
      id: strings
      shell: bash
      run: |
        echo "build-output-dir=${{ github.workspace }}/build" >> "$GITHUB_OUTPUT"

    - name: Configure CMake
      run: >
        cmake -B ${{ steps.strings.outputs.build-output-dir }}
        -DCMAKE_CXX_COMPILER=${{ matrix.cpp_compiler }}
        -DCMAKE_C_COMPILER=${{ matrix.c_compiler }}
        -DCMAKE_BUILD_TYPE=${{ matrix.build_type }}
        -S ${{ github.workspace }}
        -DVECTOR_MATH_BUILD_TEST=ON

    - name: Build
      run: cmake --build ${{ steps.strings.outputs.build-output-dir }} --config ${{ matrix.build_type }}

    - name: Test
      working-directory: ${{ steps.strings.outputs.build-output-dir }}
      run: ctest --build-config ${{ matrix.build_type }} --output-on-failure

  android-build:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false

      # Android cross-compilation matrix.
      # Tests are compiled but not executed (no Android runtime on the host runner).
      matrix:
        abi: [armeabi-v7a, arm64-v8a, x86, x86_64]
        build_type: [Release, Debug]

    steps:
    - uses: actions/checkout@v6

    - name: Configure CMake (Android)
      run: >
        cmake -B ${{ github.workspace }}/build
        -DCMAKE_TOOLCHAIN_FILE=$ANDROID_NDK_ROOT/build/cmake/android.toolchain.cmake
        -DANDROID_ABI=${{ matrix.abi }}
        -DANDROID_PLATFORM=android-21
        -DCMAKE_BUILD_TYPE=${{ matrix.build_type }}
        -DVECTOR_MATH_BUILD_TEST=ON
        -S ${{ github.workspace }}

    - name: Build
      run: cmake --build ${{ github.workspace }}/build --config ${{ matrix.build_type }}
